name: Send GroupMe Messages

on:
  schedule:
    # Runs at random times between 12:00 PM and 12:05 PM EST on Tuesday, Thursday, Friday
    # We'll run at 12:00 PM EST (5:00 PM UTC) and pick a random delay
    - cron: '0 17 * * 2,4,5'
  
  # Allows manual triggering from the Actions tab
  workflow_dispatch:
    inputs:
      message:
        description: 'Custom message to send (optional)'
        required: false
        default: ''

jobs:
  send-message:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Send scheduled message
      env:
        GROUPME_BOT_ID: ${{ secrets.GROUPME_BOT_ID }}
        GROUPME_ACCESS_TOKEN: ${{ secrets.GROUPME_ACCESS_TOKEN }}
        GROUPME_GROUP_ID: ${{ secrets.GROUPME_GROUP_ID }}
      run: |
        # Get day of week (2=Tuesday, 4=Thursday, 5=Friday)
        day_of_week=$(date +%u)
        
        # For Tuesday, Thursday, Friday - add random delay between 0-5 minutes
        if [ "$day_of_week" -eq 2 ] || [ "$day_of_week" -eq 4 ] || [ "$day_of_week" -eq 5 ]; then
          # Generate random delay in seconds (0 to 300 seconds = 0 to 5 minutes)
          random_delay=$((RANDOM % 300))
          echo "Waiting $random_delay seconds ($(($random_delay / 60)) minutes) for random scheduling..."
          sleep $random_delay
        fi
        
        # Run the Node.js script that checks for previous messages
        node send-scheduled-message.js
    
    - name: Log success
      if: success()
      run: |
        echo "Message sent at $(date)"
        echo "Next scheduled runs:"
        echo "- Tuesday at random time between 12:00 PM - 12:05 PM EST"
        echo "- Thursday at random time between 12:00 PM - 12:05 PM EST"
        echo "- Friday at random time between 12:00 PM - 12:05 PM EST"